name: u27_alt_largecap
description: >
  Alternative fixed 27-name large-cap snapshot designed to reduce the risk that the workshop
  result is a U27-only artifact while staying close to the same large-cap U.S. equity regime.
construction_rule: >
  Use a fixed liquid large-cap snapshot that allows partial overlap with the current U27 but is
  still meaningfully different from it. The basket favors broad large-cap comparability over
  sector balancing and is intended as a primary support universe rather than a replacement main
  universe.
